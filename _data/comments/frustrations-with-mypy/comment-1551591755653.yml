message: "Many of these shows are based in bigger cities like New York or Los \r\nAngeles, so you be able to travel for free if you get in to the finals.\r\nIt took about a couple of months to master the language as well as the raucous, discordant (to my ears) \"melody. The first lesson you ought to learn using your online course is how to read chord charts."
